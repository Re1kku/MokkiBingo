<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mökkibingo Pro Security</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #2e7d32; --bg: #f4f7f6; --card-bg: #ffffff; --text: #333; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 500px; }
        .card { background: var(--card-bg); padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        h1, h2, h3 { text-align: center; color: var(--primary); margin-top: 0; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 12px; background-color: var(--primary); color: white; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 5px; }
        .btn-secondary { background-color: #f5f5f5; color: #333; border: 1px solid #ccc; }
        .view { display: none; }
        .view.active { display: block; }
        .header-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 15px; }
        .back-btn { width: auto; padding: 6px 12px; font-size: 12px; margin: 0; }
        .room-card { border: 1px solid #e0e0e0; border-radius: 8px; padding: 15px; margin-bottom: 10px; cursor: pointer; background: #fafafa; }
        details { background: #e8f5e9; border-radius: 6px; margin-bottom: 10px; padding: 10px; }
        .square-item { display: flex; justify-content: space-between; align-items: center; background: white; padding: 8px; margin-top: 5px; border-radius: 4px; font-size: 14px; }
        .bingo-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; margin-top: 20px; }
        .bingo-cell { aspect-ratio: 1/1; background: white; border: 2px solid var(--primary); border-radius: 8px; display: flex; align-items: center; justify-content: center; text-align: center; font-size: 10px; cursor: pointer; }
        .bingo-cell.marked { background: var(--primary); color: white; }
    </style>
</head>
<body>

<div class="container">
    <div id="login-view" class="view active card">
        <h1>🌲 Mökkibingo Pro</h1>
        <input type="email" id="email" placeholder="Sähköposti">
        <input type="password" id="password" placeholder="Salasana">
        <button onclick="auth('login')">Kirjaudu sisään</button>
        <button onclick="showView('register-view')" class="btn-secondary">Luo uusi käyttäjä</button>
    </div>

    <div id="register-view" class="view card">
        <h1>Uusi käyttäjä</h1>
        <input type="text" id="reg-name" placeholder="Näyttönimesi (esim. Matti)">
        <input type="email" id="reg-email" placeholder="Sähköposti">
        <input type="password" id="reg-password" placeholder="Salasana">
        <button onclick="auth('register')">Luo tunnus</button>
        <button onclick="showView('login-view')" class="btn-secondary">Takaisin</button>
    </div>

    <div id="dashboard-view" class="view card">
        <div class="header-bar">
            <h3>Moi!</h3>
            <button class="btn-secondary back-btn" onclick="supabase.auth.signOut().then(() => location.reload())">Ulos</button>
        </div>
        <div id="room-list">Ladataan huoneita...</div>
        <button onclick="createRoom()" style="margin-top:20px;">➕ Luo uusi huone</button>
        <button onclick="joinRoom()" class="btn-secondary">🔑 Liity koodilla</button>
    </div>

    <div id="lobby-view" class="view card">
        <div class="header-bar">
            <button class="btn-secondary back-btn" onclick="showDashboard()">⬅ Takaisin</button>
        </div>
        <h2 id="room-name"></h2>
        <div id="accordion-container"></div>
        <button id="btn-make-bingo" onclick="generateBingo()" disabled>Tee Bingo 🎲</button>
    </div>

    <div id="game-view" class="view card">
        <button class="btn-secondary back-btn" onclick="showView('lobby-view')">⬅ Aulaan</button>
        <div id="bingo-board" class="bingo-grid"></div>
    </div>
</div>

<script>
    // --- SUPABASE ASETUKSET ---
    const SUPABASE_URL = 'https://ylfzmklrmfxobvvcqtsh.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_fTJIHoHxYM9K2jBst4rGOw_Goppt2kt';
    const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let currentRoom = null;
    let myName = "";

    function showView(id) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    // AUTH: Kirjautuminen ja Rekisteröinti
    async function auth(type) {
        if (type === 'register') {
            const email = document.getElementById('reg-email').value;
            const pass = document.getElementById('reg-password').value;
            const name = document.getElementById('reg-name').value;
            const { data, error } = await supabase.auth.signUp({ email, password: pass });
            if (error) return alert(error.message);
            // Tallennetaan nimi metadataan tai sessioon
            alert("Vahvista sähköpostisi (tai jos kytkit vahvistuksen pois, kirjaudu sisään).");
            showView('login-view');
        } else {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            const { data, error } = await supabase.auth.signInWithPassword({ email, password: pass });
            if (error) return alert(error.message);
            showDashboard();
        }
    }

    // DASHBOARD
    async function showDashboard() {
        showView('dashboard-view');
        const { data: { user } } = await supabase.auth.getUser();
        
        const { data: rooms } = await supabase.from('room_members').select('room_code, rooms(name), username').eq('user_id', user.id);
        const list = document.getElementById('room-list');
        list.innerHTML = rooms.length ? "" : "Ei huoneita.";
        rooms.forEach(r => {
            const div = document.createElement('div');
            div.className = "room-card";
            div.innerHTML = `<b>${r.rooms.name}</b><br><small>Koodi: ${r.room_code}</small>`;
            div.onclick = () => { myName = r.username; openRoom(r.rooms.name, r.room_code); };
            list.appendChild(div);
        });
    }

    async function createRoom() {
        const name = prompt("Huoneen nimi:");
        const nickname = prompt("Nimimerkkisi tässä huoneessa:");
        if (!name || !nickname) return;
        const code = Math.floor(100000 + Math.random() * 900000).toString();
        
        await supabase.from('rooms').insert([{ code, name }]);
        await supabase.from('room_members').insert([{ room_code: code, username: nickname }]);
        showDashboard();
    }

    async function joinRoom() {
        const code = prompt("Koodi:");
        const nickname = prompt("Nimimerkkisi:");
        if (!code || !nickname) return;
        const { error } = await supabase.from('room_members').insert([{ room_code: code, username: nickname }]);
        if (error) alert("Virhe liittymisessä."); else showDashboard();
    }

    // HUONE JA BINGO
    async function openRoom(name, code) {
        currentRoom = code;
        document.getElementById('room-name').innerText = name;
        showView('lobby-view');
        const { data } = await supabase.from('squares').select('*').eq('room_code', code);
        renderLobby(data || []);
    }

    function renderLobby(data) {
        const container = document.getElementById('accordion-container');
        container.innerHTML = "";
        const grouped = data.reduce((acc, s) => {
            if (!acc[s.category]) acc[s.category] = [];
            acc[s.category].push(s);
            return acc;
        }, {});

        let total = 0;
        for (let cat in grouped) {
            if (cat.toLowerCase() === myName.toLowerCase()) continue;
            total += grouped[cat].length;
            const det = document.createElement('details');
            det.innerHTML = `<summary>${cat} (${grouped[cat].length})</summary>`;
            grouped[cat].forEach(s => {
                det.innerHTML += `<div class="square-item">${s.text_content}</div>`;
            });
            det.innerHTML += `<input type="text" id="in-${cat}"><button onclick="addSq('${cat}')">Lisää</button>`;
            container.appendChild(det);
        }
        document.getElementById('btn-make-bingo').disabled = total < 25;
    }

    async function addSq(cat) {
        const val = document.getElementById('in-'+cat).value;
        await supabase.from('squares').insert([{ room_code: currentRoom, category: cat, text_content: val }]);
        openRoom(document.getElementById('room-name').innerText, currentRoom);
    }

    async function generateBingo() {
        const { data } = await supabase.from('squares').select('*').eq('room_code', currentRoom);
        const filtered = data.filter(s => s.category.toLowerCase() !== myName.toLowerCase()).map(s => s.text_content);
        const shuffled = filtered.sort(() => 0.5 - Math.random()).slice(0, 25);
        const board = document.getElementById('bingo-board');
        board.innerHTML = "";
        shuffled.forEach(t => {
            const c = document.createElement('div');
            c.className = "bingo-cell"; c.innerText = t;
            c.onclick = () => c.classList.toggle('marked');
            board.appendChild(c);
        });
        showView('game-view');
    }
</script>
</body>
</html>
