<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mökkibingon Testisivu</title>
    <style>
        /* Täällä määritellään sivun ulkoasu (CSS) */
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #e6f2ff; /* Vaaleansininen tausta */
            color: #333;
        }
        .laatikko {
            text-align: center;
            padding: 40px;
            background-color: white;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); /* Pieni varjo */
        }
        h1 {
            color: #0055cc;
        }
    </style>
</head>
<body>
    <div class="laatikko">
        <h1>Hello World! 👋</h1>
        <p>Tämä on ensimmäinen testisivuni GitHub Pagesissa.</p>
        <p>GitHub Pages toimii hienosti. Seuraavaksi voin alkaa suunnitella Mökkibingoa!</p>
    </div>
</body>
</html>
